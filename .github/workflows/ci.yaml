name: ci
on:
  push:
    branches:
      - "**"
    tags-ignore:
      - v*
jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-python: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          cache-suffix: ${{ runner.os }}-${{ matrix.python-version }}
      - name: Setup FFMPEG
        uses: FedericoCarboni/setup-ffmpeg@v3
        if: ${{ ! startsWith(matrix.os, 'macos') }}
      - name: Setup Dependencies with Homebrew
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install llvm ffmpeg
          echo "CC=$(brew --prefix)/opt/llvm/bin/clang" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix)/opt/llvm/bin/clang++" >> $GITHUB_ENV
      - name: Setup Project
        run: uv sync --all-extras --frozen
      - name: Normalize OpenCV package
        run: |
          uv run python -m pip uninstall -y opencv-python-headless
          uv run python -m pip install --no-deps --force-reinstall opencv-contrib-python-headless
      - name: Run checks
        run: |
          uv lock --check
          uv run ruff check perception tests
          uv run mypy perception
          uv run black --check .
          uv run pytest tests/
